<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#08090B">
<title>Protocol Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#08090B;font-family:'JetBrains Mono','SF Mono',monospace;color:#E0DED8;min-height:100dvh;padding-bottom:40px}
button{font-family:inherit;cursor:pointer}input,textarea{font-family:inherit}
::-webkit-scrollbar{display:none}
.hdr{border-bottom:1px solid #141518;padding:max(env(safe-area-inset-top),20px) 20px 14px;position:sticky;top:0;background:#08090B;z-index:100}
.hdr-r{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.tabs{display:flex;gap:0;overflow-x:auto}
.tab{background:none;border:none;padding:7px 11px 9px;font-size:8px;letter-spacing:1.2px;font-weight:400;color:#333;border-bottom:2px solid transparent;text-transform:uppercase;white-space:nowrap}
.tab.a{font-weight:700;color:#E0DED8}
.cnt{padding:0 20px}
.cd{background:#0D0E11;border:1px solid #18191E;border-radius:10px;padding:14px 16px;margin-bottom:10px}
.lbl{font-size:8px;letter-spacing:2px;color:#333;font-weight:700}
.ib{background:#111218;border-radius:8px;padding:12px 14px;font-size:10px;color:#555;line-height:1.6;margin-top:12px}
.ib strong{color:#888}
.recon-row{display:flex;justify-content:space-between;padding:5px 0;border-top:1px solid #141518}
.recon-row span:first-child{font-size:9px;color:#444}
.recon-row span:last-child{font-size:10px;color:#888;font-weight:500;text-align:right;max-width:62%}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-r">
    <div>
      <div style="font-size:8px;letter-spacing:4px;color:#333;font-weight:700">14-WEEK RECOMP</div>
      <h1 style="font-size:18px;font-weight:800;letter-spacing:-0.5px;margin-top:2px">PEPTIDE PROTOCOL</h1>
      <div style="font-size:9px;color:#444;margin-top:3px">83kg · 181cm · 12-15% → 9-11% BF</div>
    </div>
    <div style="text-align:right">
      <div id="phN" style="font-size:11px;font-weight:700"></div>
      <div id="phT" style="font-size:9px;color:#555;margin-top:1px"></div>
      <div id="phW" style="font-size:9px;color:#333;margin-top:1px"></div>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
</div>
<div class="cnt" id="cnt"></div>

compounds:[

    store:"Fridge, use within 30 days",vials:2,timing:"Sunday evening",cycle:"Weeks 3–14 (titrate wk3–8, cruise wk9–14)"},
  {key:"mt2",name:"MELANOTAN II 10mg",sub:"Melanocortin Agonist · Tanning",color:"#C084FC",

    store:"Fridge, use within 28 days",vials:1,timing:"Before bed (with CJC/Ipa)",cycle:"Wk3–4 load daily, wk4–10 2×/wk, wk11–14 1×/wk"},

    store:"TBD",vials:"—",timing:"Post-workout if added",cycle:"If added: wk9–12 only (4wk blast then OFF)"}
],
topicals:[{name:"GHK-Cu Serum",use:"AM + PM on clean skin",target:"Acne, scarring, skin quality"},{name:"Niacinamide 5% Serum",use:"AM under SPF",target:"Sebum control, barrier repair"}],
orals:[{name:"Niacinamide",dose:"500mg/day"},{name:"Zinc Picolinate",dose:"30mg/day"},{name:"Vitamin D3",dose:"5000 IU/day"},{name:"Magnesium Glycinate",dose:"400mg before bed"}],
weeks:[
{week:1,phase:"BASE",pins:[{compound:"klow",dose:"10 units (0.1ml)",when:"☀️ AM fasted",detail:"500mcg BPC / 500mcg TB / 500mcg KPV / 2.5mg GHK-Cu",freq:"daily"},{compound:"cjc",dose:"6 units (0.06ml)",when:"🌙 Before bed",detail:"~200mcg total — empty stomach, GH pulse during deep sleep",freq:"daily"}],training:"Full intensity — log all lifts for baseline",macros:{cals:"2,800–2,900",p:200,f:75,c:"320–340"},notes:"Establish pinning routine. No reta/MT-2 yet. Build the habit.",blood:"BASELINE BLOODS: IGF-1, metabolic panel, fasting glucose/insulin, HbA1c, lipids, CRP, testosterone (free + total)"},
{week:2,phase:"BASE",pins:[{compound:"klow",dose:"10 units",when:"☀️ AM",detail:"Same as week 1",freq:"daily"},{compound:"cjc",dose:"6 units",when:"🌙 Before bed",detail:"Same as week 1",freq:"daily"}],training:"Progressive overload — add weight or reps",macros:{cals:"2,800–2,900",p:200,f:75,c:"320–340"},notes:"Assess sleep quality. Recovery improvements? Dial in meal timing."},
{week:3,phase:"INTRODUCTION",pins:[{compound:"klow",dose:"10 units",when:"☀️ AM",detail:"Same protocol",freq:"daily"},{compound:"cjc",dose:"6 units",when:"🌙 Before bed",detail:"Same protocol",freq:"daily"},{compound:"reta",dose:"0.5mg (10 units)",when:"🟡 Sunday PM",detail:"Light meal before. Expect mild nausea 24-48hrs.",freq:"1×/week"},{compound:"mt2",dose:"250mcg (5 units)",when:"🌙 Before bed",detail:"LOADING: daily×10. Separate syringe with CJC/Ipa. 15-20min UV.",freq:"daily×10"}],training:"Maintain intensity. Monitor appetite from reta.",macros:{cals:"2,800–2,900",p:200,f:75,c:"320–340"},notes:"MT-2 loading starts. Nausea + flushing likely. Pin before bed to sleep through it."},
{week:4,phase:"INTRODUCTION",pins:[{compound:"klow",dose:"10 units",when:"☀️ AM",detail:"Same protocol",freq:"daily"},{compound:"cjc",dose:"6 units",when:"🌙 Before bed",detail:"Same protocol",freq:"daily"},{compound:"reta",dose:"0.5mg (10 units)",when:"🟡 Sunday PM",detail:"Tolerability check. Note appetite changes.",freq:"1×/week"},{compound:"mt2",dose:"500mcg (10 units)",when:"🌙 Before bed",detail:"MAINTENANCE: 2×/week (Mon + Thu).",freq:"2×/week"}],training:"Progressive overload. Tan building.",macros:{cals:"2,800–2,900",p:200,f:75,c:"320–340"},notes:"MT-2 → maintenance. Brief UV to activate melanin. Don't burn."},
{week:5,phase:"ESCALATION",pins:[{compound:"klow",dose:"10 units",when:"☀️ AM",detail:"Same protocol",freq:"daily"},{compound:"cjc",dose:"6 units",when:"🌙 Before bed",detail:"Same protocol",freq:"daily"},{compound:"reta",dose:"1mg (20 units)",when:"🟡 Sunday PM",detail:"First escalation. Warmer, more satiety.",freq:"1×/week"},{compound:"mt2",dose:"500mcg (10 units)",when:"🌙 Before bed",detail:"Maintenance 2×/week",freq:"2×/week"}],training:"Push intensity — growth window opening",macros:{cals:"2,800–2,900",p:200,f:75,c:"320–340"},notes:"Reta metabolic effect kicks in. Tan deepening."},
{week:6,phase:"ESCALATION",pins:[{compound:"klow",dose:"10 units",when:"☀️ AM",detail:"Same protocol",freq:"daily"},{compound:"cjc",dose:"6 units",when:"🌙 Before bed",detail:"Same protocol",freq:"daily"},{compound:"reta",dose:"1mg (20 units)",when:"🟡 Sunday PM",detail:"Hold dose. Assess tolerability.",freq:"1×/week"},{compound:"mt2",dose:"500mcg (10 units)",when:"🌙 Before bed",detail:"Maintenance 2×/week",freq:"2×/week"}],training:"Progressive overload — track all lifts",macros:{cals:"2,800–2,900",p:200,f:75,c:"320–340"},notes:"Leaner lower back/midsection. Tan established. Skin improving.",blood:"MID-CYCLE BLOODS: IGF-1, liver panel, fasting glucose, CRP"},
{week:7,phase:"ESCALATION II",pins:[{compound:"klow",dose:"10 units",when:"☀️ AM",detail:"Same protocol",freq:"daily"},{compound:"cjc",dose:"6 units",when:"🌙 Before bed",detail:"Same protocol",freq:"daily"},{compound:"reta",dose:"1.5mg (30 units)",when:"🟡 Sunday PM",detail:"Final escalation → cruise dose.",freq:"1×/week"},{compound:"mt2",dose:"500mcg (10 units)",when:"🌙 Before bed",detail:"Maintenance 2×/week",freq:"2×/week"}],training:"Maintain or increase intensity.",macros:{cals:"2,700–2,800",p:200,f:70,c:"300–320"},notes:"Slight calorie reduction. Mirror changes accelerating."},
{week:8,phase:"ESCALATION II",pins:[{compound:"klow",dose:"10 units",when:"☀️ AM",detail:"Same protocol",freq:"daily"},{compound:"cjc",dose:"6 units",when:"🌙 Before bed",detail:"Same protocol",freq:"daily"},{compound:"reta",dose:"1.5mg (30 units)",when:"🟡 Sunday PM",detail:"Cruise dose — hold here.",freq:"1×/week"},{compound:"mt2",dose:"500mcg (10 units)",when:"🌙 Before bed",detail:"Maintenance 2×/week",freq:"2×/week"}],training:"Assess strength. Maintain loads.",macros:{cals:"2,700–2,800",p:200,f:70,c:"300–320"},notes:"⚡ IGF-1 LR3 DECISION POINT: Review bloods + mirror. If adding: 20-40mcg/day post-workout, 4 weeks.",blood:"Review week 6 bloods. IGF-1? Liver? CRP?"},
{week:9,phase:"CRUISE",pins:[{compound:"klow",dose:"10 units",when:"☀️ AM",detail:"Same protocol",freq:"daily"},{compound:"cjc",dose:"6 units",when:"🌙 Before bed",detail:"Same protocol",freq:"daily"},{compound:"reta",dose:"1.5mg (30 units)",when:"🟡 Sunday PM",detail:"Cruise dose",freq:"1×/week"},{compound:"mt2",dose:"500mcg (10 units)",when:"🌙 Before bed",detail:"Maintenance 2×/week",freq:"2×/week"}],training:"PPL / Upper / Lower — full V-taper focus",macros:{cals:"2,700–2,800",p:200,f:70,c:"300–320"},notes:"Payoff window. Train hard, eat precisely, sleep 7-8hrs."},
{week:10,phase:"CRUISE",pins:[{compound:"klow",dose:"10 units",when:"☀️ AM",detail:"Same protocol",freq:"daily"},{compound:"cjc",dose:"6 units",when:"🌙 Before bed",detail:"Same protocol",freq:"daily"},{compound:"reta",dose:"1.5mg (30 units)",when:"🟡 Sunday PM",detail:"Cruise dose",freq:"1×/week"},{compound:"mt2",dose:"500mcg (10 units)",when:"🌙 Before bed",detail:"Maintenance 2×/week",freq:"2×/week"}],training:"Shoulder caps, lat width, upper chest",macros:{cals:"2,700–2,800",p:200,f:70,c:"300–320"},notes:"Veins in arms/shoulders. Ab definition improving."},
{week:11,phase:"CRUISE",pins:[{compound:"klow",dose:"10 units",when:"☀️ AM",detail:"Same protocol",freq:"daily"},{compound:"cjc",dose:"6 units",when:"🌙 Before bed",detail:"Same protocol",freq:"daily"},{compound:"reta",dose:"1.5mg (30 units)",when:"🟡 Sunday PM",detail:"Cruise dose",freq:"1×/week"},{compound:"mt2",dose:"500mcg (10 units)",when:"🌙 Before bed",detail:"1×/week if tan deep enough",freq:"1-2×/week"}],training:"Strength maintenance is a win",macros:{cals:"2,600–2,700",p:200,f:70,c:"280–300"},notes:"Calorie reduction if fat loss plateaued. Protein stays 200g."},
{week:12,phase:"CRUISE",pins:[{compound:"klow",dose:"10 units",when:"☀️ AM",detail:"Same protocol",freq:"daily"},{compound:"cjc",dose:"6 units",when:"🌙 Before bed",detail:"Same protocol",freq:"daily"},{compound:"reta",dose:"1.5mg (30 units)",when:"🟡 Sunday PM",detail:"Cruise dose",freq:"1×/week"},{compound:"mt2",dose:"500mcg (10 units)",when:"🌙 Before bed",detail:"Maintenance",freq:"1×/week"}],training:"Maintain intensity",macros:{cals:"2,600–2,700",p:200,f:70,c:"280–300"},notes:"Visibly leaner + tanned. Shoulders fuller despite lower BF."},
{week:13,phase:"CRUISE",pins:[{compound:"klow",dose:"10 units",when:"☀️ AM",detail:"Same protocol",freq:"daily"},{compound:"cjc",dose:"6 units",when:"🌙 Before bed",detail:"Same protocol",freq:"daily"},{compound:"reta",dose:"1.5mg (30 units)",when:"🟡 Sunday PM",detail:"Cruise dose",freq:"1×/week"},{compound:"mt2",dose:"500mcg (10 units)",when:"🌙 Before bed",detail:"Maintenance",freq:"1×/week"}],training:"Final push — peak stimulus",macros:{cals:"2,600–2,700",p:200,f:70,c:"280–300"},notes:"Dramatically different from week 1. Plan post-protocol."},
{week:14,phase:"CRUISE",pins:[{compound:"klow",dose:"10 units",when:"☀️ AM",detail:"Final week",freq:"daily"},{compound:"cjc",dose:"6 units",when:"🌙 Before bed",detail:"Final week",freq:"daily"},{compound:"reta",dose:"1.5mg (30 units)",when:"🟡 Sunday PM",detail:"Final dose",freq:"1×/week"},{compound:"mt2",dose:"500mcg (10 units)",when:"🌙 Before bed",detail:"Final maintenance",freq:"1×/week"}],training:"Deload if needed",macros:{cals:"2,600–2,700",p:200,f:70,c:"280–300"},notes:"TARGET: 81-83kg at 9-11% BF. Tanned, lean, full.",blood:"END BLOODS: Full panel — compare to baseline."}
],
training:[{day:"PUSH",ex:"Incline DB press · OHP · Lateral raises (heavy partials + full ROM) · Triceps",focus:"Shoulder cap + upper chest"},{day:"PULL",ex:"Weighted pull-ups (wide) · Chest-supported rows · Face pulls · Biceps",focus:"Lat width → V-taper"},{day:"LEGS",ex:"Squat / Leg press · RDLs · Leg curls · Calves",focus:"Moderate — slower recovery"},{day:"UPPER",ex:"Flat bench · Barbell rows · Lateral raises · Arms superset",focus:"2nd shoulder + arm hit"},{day:"LOWER",ex:"Deadlift / Hip thrust · Front squat · Lunges · Calves",focus:"Moderate volume"}],
shopping:[{item:"Klow Blend 80mg",qty:3},{item:"CJC/Ipa 10mg Blend",qty:3},{item:"Retatrutide (GLP-3 RT) 10mg",qty:2},{item:"Melanotan II 10mg",qty:1},{item:"BAC Water 30ml",qty:1},{item:"Insulin Syringes 1ml (29g)",qty:100},{item:"Alcohol Swabs",qty:100},{item:"GHK-Cu Topical Serum",qty:1},{item:"Niacinamide 5% Serum",qty:1},{item:"Niacinamide 500mg (oral)",qty:1},{item:"Zinc Picolinate 30mg",qty:1},{item:"Vitamin D3 5000 IU",qty:1},{item:"Magnesium Glycinate 400mg",qty:1}]};

const CC={klow:"#4A9EAF",cjc:"#7B8CDE",reta:"#D4A853",mt2:"#C084FC",igf:"#8B3A3A"};
const TABS=["protocol","routine","progress","compounds","training","shopping"];
let S={tab:"protocol",week:1,checks:{},notes:{},weights:{},startDate:null};

function load(){try{const d=JSON.parse(localStorage.getItem("pp-v4")||"{}");S.checks=d.checks||{};S.notes=d.notes||{};S.weights=d.weights||{};S.startDate=d.startDate||null;if(d.week)S.week=d.week}catch(e){}}
function save(){localStorage.setItem("pp-v4",JSON.stringify(S))}
function gP(w){return P.phases.find(p=>p.weeks.includes(w))}
function gW(w){return P.weeks.find(x=>x.week===w)}
function gC(k){return P.compounds.find(c=>c.key===k)}
function fmt(d){return String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0")}
function wkStart(wk){if(!S.startDate)return null;const d=new Date(S.startDate+"T00:00:00");d.setDate(d.getDate()+(wk-1)*7);return d}
function dayD(wk,i){const s=wkStart(wk);if(!s)return null;const d=new Date(s);d.setDate(d.getDate()+i);return d}
function pct(wk){const w=gW(wk);if(!w)return 0;let t=0,d=0;w.pins.forEach(p=>{const n=p.freq==="daily"?7:p.freq==="daily×10"?7:p.freq.includes("week")?parseInt(p.freq)||1:1;for(let i=0;i<n;i++){t++;if(S.checks[`${wk}-${p.compound}-${i}`])d++}});return t>0?Math.round(d/t*100):0}
function toggle(key){S.checks[key]=!S.checks[key];save();render()}
function setSD(v){S.startDate=v;save();render()}

function updateHdr(){
  const ph=gP(S.week);const ws=wkStart(S.week);
  document.getElementById("phN").style.color=ph.color;
  document.getElementById("phN").textContent=ph.name;
  document.getElementById("phT").textContent=ph.tag;
  document.getElementById("phW").textContent=ws?`Wk ${S.week}/14 · starts ${fmt(ws)}`:`Wk ${S.week}/14`;
  document.getElementById("tabs").innerHTML=TABS.map(t=>`<button class="tab${S.tab===t?" a":""}" style="${S.tab===t?`border-bottom-color:${ph.color}`:""}" onclick="S.tab='${t}';render()">${t}</button>`).join("");
}

function rProto(){
  const ph=gP(S.week);const wd=gW(S.week);let h="";
  if(!S.startDate){
    h+=`<div class="cd" style="border-color:#D4A85330;background:#D4A85308;margin-top:16px">
      <div class="lbl" style="color:#D4A853;margin-bottom:8px">SET YOUR START DATE</div>
      <div style="font-size:10px;color:#888;margin-bottom:10px">When does Week 1 begin?</div>
      <input type="date" id="sdp" value="2026-04-02" style="background:#111218;border:1px solid #18191E;border-radius:6px;padding:8px 12px;color:#E0DED8;font-family:inherit;font-size:12px;width:100%">
      <button onclick="setSD(document.getElementById('sdp').value)" style="margin-top:8px;background:${ph.color};border:none;border-radius:6px;padding:8px 16px;color:#fff;font-size:10px;font-weight:600;letter-spacing:1px;width:100%">START PROTOCOL</button>
    </div>`;
  }else{
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin:14px 0 6px">
      <div class="lbl">WEEKS</div>
      <button onclick="if(confirm('Change start date? Your data stays.')){S.startDate=null;save();render()}" style="background:none;border:none;font-size:8px;color:#333;font-family:inherit;text-decoration:underline">edit date</button>
    </div>`;
  }
  h+=`<div style="display:flex;gap:3px;margin:4px 0 18px;flex-wrap:wrap">`;
  P.weeks.forEach(w=>{
    const p=gP(w.week);const pc=pct(w.week);const a=w.week===S.week;const ws=wkStart(w.week);
    h+=`<button onclick="S.week=${w.week};save();render()" style="width:${S.startDate?44:34}px;height:${S.startDate?50:42}px;background:${a?"#111218":"transparent"};border:${a?`1px solid ${p.color}30`:"1px solid #141518"};border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;position:relative">
      ${S.startDate?`<span style="font-size:9px;font-weight:${a?700:400};color:${a?p.color:"#555"};font-family:inherit">${fmt(ws)}</span><span style="font-size:7px;color:#333">WK ${w.week}</span>`:`<span style="font-size:11px;font-weight:${a?800:400};color:${a?p.color:"#555"};font-family:inherit">${w.week}</span>`}
      ${pc>0?`<div style="width:14px;height:2px;background:#141518;border-radius:1px;overflow:hidden"><div style="width:${pc}%;height:100%;background:${pc===100?"#4ADE80":p.color}"></div></div>`:""}
      ${w.blood?'<div style="position:absolute;top:2px;right:2px;width:4px;height:4px;border-radius:50%;background:#EF4444"></div>':""}
    </button>`;
  });
  h+=`</div>`;
  if(!wd)return h;
  if(wd.notes)h+=`<div class="cd" style="${wd.notes.includes("DECISION")?"background:#D4A85308;border-color:#D4A85320":""};font-size:11px;color:#888;line-height:1.7">${wd.notes}</div>`;
  if(wd.blood)h+=`<div class="cd" style="background:#EF444408;border-color:#EF444418"><div class="lbl" style="color:#EF4444;margin-bottom:4px">🩸 BLOODWORK</div><div style="font-size:10px;color:#F87171;line-height:1.6">${wd.blood}</div></div>`;
  const ac=wd.pins.map(p=>p.compound);
  h+=`<div style="display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap">`;
  P.compounds.forEach(c=>{const on=ac.includes(c.key);if(c.key==="igf"&&!on)return;h+=`<div style="font-size:8px;letter-spacing:1px;padding:3px 8px;border-radius:4px;background:${on?c.color+"18":"#0D0E11"};color:${on?c.color:"#333"};border:1px solid ${on?c.color+"30":"#18191E"};font-weight:${on?600:400}">${on?"●":"○"} ${c.key.toUpperCase()}</div>`});
  h+=`</div>`;
  wd.pins.forEach(pin=>{
    const cc=CC[pin.compound];const c=gC(pin.compound);
    const isW=pin.freq!=="daily"&&pin.freq!=="daily×10";
    let slots=[];
    if(isW){slots=pin.freq==="2×/week"?[{l:"Pin 1",i:0},{l:"Pin 2",i:1}]:[{l:"Pin",i:0}]}
    else{const dn=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];for(let i=0;i<7;i++){const dd=dayD(S.week,i);slots.push({l:dd?fmt(dd):dn[i],i})}}
    h+=`<div class="cd" style="border-left:3px solid ${cc}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div><div style="font-size:11px;font-weight:700;color:${cc}">${c.name}</div><div style="font-size:9px;color:#444;margin-top:1px">${pin.when}</div></div>
        <div style="text-align:right"><div style="font-size:12px;font-weight:700">${pin.dose}</div><div style="font-size:9px;color:#555">${pin.freq}</div></div>
      </div>
      <div style="font-size:9px;color:#555;margin-bottom:10px;line-height:1.5">${pin.detail}</div>
      <div style="display:flex;gap:4px">${slots.map(s=>{const k=`${S.week}-${pin.compound}-${s.i}`;const on=S.checks[k];return`<button onclick="toggle('${k}')" style="flex:${isW?"0 0 auto":"1"};min-width:${isW?"50px":"0"};height:30px;background:${on?cc+"15":"#111218"};border:${on?`1px solid ${cc}40`:"1px solid #18191E"};border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:${S.startDate?8:9}px;font-weight:600;color:${on?cc:"#333"};font-family:inherit">${on?"✓":s.l}</button>`}).join("")}</div></div>`;
  });
  h+=`<div class="cd"><div class="lbl" style="margin-bottom:10px">DAILY MACROS (TRAINING DAYS)</div><div style="display:flex;gap:8px">${[{l:"CALS",v:wd.macros.cals,c:"#E0DED8"},{l:"PROTEIN",v:wd.macros.p+"g",c:"#4ADE80"},{l:"FAT",v:wd.macros.f+"g",c:"#FBBF24"},{l:"CARBS",v:wd.macros.c+"g",c:"#60A5FA"}].map(m=>`<div style="flex:1;text-align:center"><div style="font-size:13px;font-weight:800;color:${m.c}">${m.v}</div><div style="font-size:7px;letter-spacing:1.5px;color:#333;margin-top:2px">${m.l}</div></div>`).join("")}</div><div style="font-size:9px;color:#333;margin-top:8px;text-align:center">Rest days: same protein, –60-80g carbs, –300 cals</div></div>`;
  h+=`<div class="cd"><div class="lbl">TRAINING</div><div style="font-size:11px;color:#888;line-height:1.5;margin-top:4px">${wd.training}</div></div>`;
  h+=`<div style="display:flex;gap:8px;margin-bottom:16px">
    <div class="cd" style="flex:0 0 100px"><div class="lbl">WEIGHT</div><input type="number" step="0.1" placeholder="—" value="${S.weights[S.week]||""}" oninput="S.weights[${S.week}]=this.value;save()" style="background:transparent;border:none;outline:none;font-size:18px;font-weight:800;color:#E0DED8;width:100%;font-family:inherit;margin-top:4px"><div style="font-size:8px;color:#333">kg</div></div>
    <div class="cd" style="flex:1"><div class="lbl">YOUR NOTES</div><textarea rows="2" placeholder="Training, appetite, skin, tan..." oninput="S.notes[${S.week}]=this.value;save()" style="background:transparent;border:none;outline:none;resize:none;font-size:10px;color:#777;width:100%;font-family:inherit;line-height:1.5;margin-top:4px">${S.notes[S.week]||""}</textarea></div></div>`;
  return h;
}

function rProgress(){
  let h=`<div style="margin-top:18px"><div class="lbl" style="margin-bottom:14px">WEIGHT TRACKING</div>`;
  const ent=[];for(let i=1;i<=14;i++){if(S.weights[i])ent.push({w:i,kg:parseFloat(S.weights[i])})}
  if(!ent.length){
    h+=`<div class="cd" style="text-align:center;padding:30px"><div style="font-size:11px;color:#555">No weight entries yet.</div><div style="font-size:9px;color:#333;margin-top:4px">Log weight in the Protocol tab each week.</div></div>`;
  }else{
    const mn=Math.min(...ent.map(e=>e.kg)),mx=Math.max(...ent.map(e=>e.kg)),rng=mx-mn||1;
    const diff=ent[ent.length-1].kg-ent[0].kg;
    h+=`<div class="cd" style="background:#111218"><div style="display:flex;gap:12px">
      <div style="flex:1;text-align:center"><div style="font-size:20px;font-weight:800">${ent[ent.length-1].kg.toFixed(1)}</div><div style="font-size:7px;letter-spacing:1.5px;color:#555;margin-top:2px">CURRENT KG</div></div>
      <div style="flex:1;text-align:center"><div style="font-size:20px;font-weight:800;color:${diff<=0?"#4ADE80":"#FBBF24"}">${diff>0?"+":""}${diff.toFixed(1)}</div><div style="font-size:7px;letter-spacing:1.5px;color:#555;margin-top:2px">CHANGE</div></div>
      <div style="flex:1;text-align:center"><div style="font-size:20px;font-weight:800;color:#60A5FA">${ent.length}</div><div style="font-size:7px;letter-spacing:1.5px;color:#555;margin-top:2px">ENTRIES</div></div>
    </div></div>`;
    h+=`<div class="cd"><div class="lbl" style="margin-bottom:12px">TREND</div><div style="position:relative;height:100px;margin:0 30px 0 35px;border-bottom:1px solid #18191E;border-left:1px solid #18191E">
      <div style="position:absolute;top:-4px;left:-34px;font-size:8px;color:#444">${mx.toFixed(1)}</div>
      <div style="position:absolute;bottom:-4px;left:-34px;font-size:8px;color:#444">${mn.toFixed(1)}</div>`;
    ent.forEach((e,i)=>{const x=(e.w-1)/13*100;const y=(1-(e.kg-mn)/rng)*100;const ph=gP(e.w);h+=`<div style="position:absolute;left:${x}%;top:${y}%;transform:translate(-50%,-50%);width:8px;height:8px;border-radius:50%;background:${ph.color};z-index:2"></div>`;if(i>0){const p=ent[i-1];const px=(p.w-1)/13*100;const py=(1-(p.kg-mn)/rng)*100;h+=`<svg style="position:absolute;inset:0;width:100%;height:100%;overflow:visible"><line x1="${px}%" y1="${py}%" x2="${x}%" y2="${y}%" stroke="#333" stroke-width="1"/></svg>`}});
    h+=`</div></div>`;
    h+=`<div class="lbl" style="margin-top:14px;margin-bottom:8px">LOG</div>`;
    for(let i=14;i>=1;i--){if(!S.weights[i])continue;const ws=wkStart(i);const ph=gP(i);const prev=S.weights[i-1]?parseFloat(S.weights[i])-parseFloat(S.weights[i-1]):null;
    h+=`<div class="cd" style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px">
      <div><span style="font-size:11px;font-weight:600;color:${ph.color}">Wk ${i}</span>${ws?`<span style="font-size:9px;color:#333;margin-left:6px">${fmt(ws)}</span>`:""}</div>
      <div style="display:flex;align-items:center;gap:8px">${prev!==null?`<span style="font-size:9px;color:${prev<=0?"#4ADE80":"#FBBF24"}">${prev>0?"+":""}${prev.toFixed(1)}</span>`:""}<span style="font-size:13px;font-weight:800">${parseFloat(S.weights[i]).toFixed(1)}</span><span style="font-size:8px;color:#333">kg</span></div></div>`}
  }
  h+=`</div>`;return h;
}

function rRoutine(){
  return`<div style="margin-top:18px"><div class="lbl" style="margin-bottom:14px">YOUR ACTUAL DAILY ROUTINE</div>
  <div class="cd" style="border-left:3px solid #4A9EAF"><div style="font-size:10px;font-weight:700;color:#4A9EAF;margin-bottom:8px">☀️ MORNING — BEFORE FOOD</div><div style="font-size:10px;color:#888;line-height:1.8">1. Alcohol swab (belly, rotate L/R)<br>2. Draw 10 units Klow → pin subQ<br>3. Done. ~30 seconds.</div><div style="font-size:9px;color:#444;margin-top:8px;border-top:1px solid #18191E;padding-top:8px;line-height:1.6">Then: GHK-Cu + Niacinamide serum on face. Zinc + D3 + niacinamide with breakfast.</div></div>
  <div class="cd" style="border-left:3px solid #7B8CDE"><div style="font-size:10px;font-weight:700;color:#7B8CDE;margin-bottom:8px">🌙 BEFORE BED — EMPTY STOMACH</div><div style="font-size:10px;color:#888;line-height:1.8">1. Draw 6 units CJC/Ipa → pin subQ (belly)<br>2. On MT-2 days: second syringe, 5-10 units → pin<br>3. Magnesium glycinate<br>4. Done. ~45 seconds.</div><div style="font-size:9px;color:#444;margin-top:8px;border-top:1px solid #18191E;padding-top:8px;line-height:1.6">GHK-Cu serum on face. CJC/Ipa syncs with deepest GH window.</div></div>
  <div class="cd" style="border-left:3px solid #D4A853"><div style="font-size:10px;font-weight:700;color:#D4A853;margin-bottom:8px">🟡 SUNDAY — WEEKLY</div><div style="font-size:10px;color:#888;line-height:1.8">1. Reta dose (10-30 units per phase) → pin subQ<br>2. Light meal before. Stay hydrated.<br>3. Same sitting as CJC/Ipa, separate syringe.</div></div>
  <div class="cd" style="border-left:3px solid #C084FC"><div style="font-size:10px;font-weight:700;color:#C084FC;margin-bottom:8px">MT-2 SCHEDULE</div><div style="font-size:10px;color:#888;line-height:1.8"><strong style="color:#C084FC">Wk 3-4 load:</strong> 250mcg (5 units) daily×10 before bed<br><strong style="color:#C084FC">Wk 4-10:</strong> 500mcg (10 units) 2×/wk (Mon+Thu)<br><strong style="color:#C084FC">Wk 11-14:</strong> 500mcg (10 units) 1×/wk</div><div style="font-size:9px;color:#EF4444;margin-top:8px;border-top:1px solid #18191E;padding-top:8px;line-height:1.6">⚠️ Mole map BEFORE + AFTER. 15-20min UV within hours of pin. Don't burn.</div></div>
  <div style="display:flex;gap:12px;background:#111218;border-radius:10px;padding:16px;margin-bottom:16px"><div style="flex:1;text-align:center"><div style="font-size:26px;font-weight:800;color:#4ADE80">2</div><div style="font-size:7px;color:#555;letter-spacing:1.5px;margin-top:2px">MOST DAYS</div></div><div style="flex:1;text-align:center"><div style="font-size:26px;font-weight:800;color:#FBBF24">3</div><div style="font-size:7px;color:#555;letter-spacing:1.5px;margin-top:2px">MT-2 DAYS</div></div><div style="flex:1;text-align:center"><div style="font-size:26px;font-weight:800;color:#D4A853">+1</div><div style="font-size:7px;color:#555;letter-spacing:1.5px;margin-top:2px">SUNDAYS</div></div></div></div>`}

function rComp(){
  let h=`<div style="margin-top:18px">`;
  h+=`<div class="lbl" style="margin-bottom:14px">RECONSTITUTION GUIDE</div>`;
  // Reconstitution summary table
  h+=`<div class="cd" style="background:#111218;padding:16px">
    <div style="display:grid;grid-template-columns:1fr auto auto auto;gap:0;font-size:9px">
      <div style="padding:6px 4px;color:#555;border-bottom:1px solid #1E1F24;font-weight:700">COMPOUND</div>
      <div style="padding:6px 8px;color:#555;border-bottom:1px solid #1E1F24;font-weight:700;text-align:center">BAC</div>
      <div style="padding:6px 8px;color:#555;border-bottom:1px solid #1E1F24;font-weight:700;text-align:center">CONC</div>
      <div style="padding:6px 8px;color:#555;border-bottom:1px solid #1E1F24;font-weight:700;text-align:center">DRAW</div>`;
  P.compounds.filter(c=>c.key!=="igf").forEach(c=>{
    h+=`<div style="padding:8px 4px;color:${c.color};font-weight:600;border-bottom:1px solid #141518">${c.key.toUpperCase()}</div>
      <div style="padding:8px;color:#888;text-align:center;border-bottom:1px solid #141518">${c.bac}</div>
      <div style="padding:8px;color:#888;text-align:center;border-bottom:1px solid #141518">${c.conc}</div>
      <div style="padding:8px;color:#E0DED8;text-align:center;border-bottom:1px solid #141518;font-weight:600">${c.draw.split("→")[0].trim()}</div>`;
  });
  h+=`</div><div style="font-size:9px;color:#444;margin-top:10px;line-height:1.6">Three of four get 2ml BAC water. CJC/Ipa gets 3ml — the draw volume is too small otherwise.</div></div>`;

  // Individual compound cards
  P.compounds.forEach(c=>{
    h+=`<div class="cd" style="border-left:3px solid ${c.color};opacity:${c.key==="igf"?0.4:1}">
      <div style="font-size:12px;font-weight:700;color:${c.color}">${c.name}</div>
      <div style="font-size:9px;color:#555;margin:1px 0 10px">${c.sub}</div>
      <div class="recon-row"><span>BAC water</span><span style="color:${c.color};font-weight:600">${c.bac}</span></div>
      <div class="recon-row"><span>Concentration</span><span>${c.conc}</span></div>
      <div class="recon-row"><span>Daily draw</span><span style="color:#E0DED8;font-weight:600">${c.draw}</span></div>
      <div class="recon-row"><span>That gives you</span><span style="font-size:9px">${c.drawDetail}</span></div>
      <div class="recon-row"><span>Storage</span><span>${c.store}</span></div>
      <div class="recon-row"><span>Timing</span><span>${c.timing}</span></div>
      <div class="recon-row"><span>Cycle</span><span style="color:${c.color}">${c.cycle}</span></div>
    </div>`;
  });
  h+=`<div class="lbl" style="margin-top:18px;margin-bottom:10px">TOPICALS</div>`;
  P.topicals.forEach(t=>{h+=`<div class="cd" style="display:flex;justify-content:space-between"><div><div style="font-size:11px;color:#888;font-weight:600">${t.name}</div><div style="font-size:9px;color:#444">${t.use}</div></div><div style="font-size:9px;color:#555;text-align:right">${t.target}</div></div>`});
  h+=`<div class="lbl" style="margin-top:18px;margin-bottom:10px">DAILY ORALS</div>`;
  P.orals.forEach(o=>{h+=`<div class="cd" style="display:flex;justify-content:space-between"><span style="font-size:11px;color:#888">${o.name}</span><span style="font-size:11px;color:#E0DED8;font-weight:600">${o.dose}</span></div>`});
  h+=`<div class="ib" style="margin-bottom:20px"><strong>Reconstitution:</strong> BAC water only (not sterile water). Inject slowly down inside wall of vial. Swirl gently — never shake. Store reconstituted vials in fridge.</div></div>`;return h}

function rTrain(){const ph=gP(S.week);let h=`<div style="margin-top:18px"><div class="lbl" style="margin-bottom:14px">PPL / UPPER / LOWER — V-TAPER PRIORITY</div>`;P.training.forEach(t=>{h+=`<div class="cd"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px"><span style="font-size:12px;font-weight:800">${t.day}</span><span style="font-size:8px;letter-spacing:1.5px;color:${ph.color};font-weight:700">${t.focus}</span></div><div style="font-size:10px;color:#666;line-height:1.6">${t.ex}</div></div>`});h+=`<div class="ib" style="margin-bottom:20px"><strong>Rule:</strong> Add weight or reps weekly. Hold if regression after wk 8-9. V-taper = the look at 181cm.</div></div>`;return h}

function rShop(){const cols=[CC.klow,CC.cjc,CC.reta,CC.mt2];let h=`<div style="margin-top:18px"><div class="lbl" style="margin-bottom:14px">14-WEEK SUPPLY LIST</div>`;P.shopping.forEach((s,i)=>{h+=`<div class="cd" style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;${i<4?`border-left:3px solid ${cols[i]}`:""}"><span style="font-size:11px;color:${i<7?"#E0DED8":"#888"}">${s.item}</span><span style="font-size:12px;font-weight:800;color:${i<4?"#D4A853":"#555"}">×${s.qty}</span></div>`});h+=`<div class="ib" style="margin-bottom:20px"><strong>IGF-1 LR3 not listed</strong> — week 8 decision. If added: 1-2 vials (1mg) for 4-week blast.</div></div>`;return h}

function render(){updateHdr();const m={protocol:rProto,routine:rRoutine,progress:rProgress,compounds:rComp,training:rTrain,shopping:rShop};document.getElementById("cnt").innerHTML=(m[S.tab]||rProto)()}
load();render();
</script>
</body>
</html>
