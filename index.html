<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#08090B">
<title>Protocol Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#08090B;font-family:'JetBrains Mono','SF Mono',monospace;color:#E0DED8;min-height:100vh;min-height:100dvh;padding-bottom:env(safe-area-inset-bottom)}
button{font-family:inherit;cursor:pointer}
input,textarea{font-family:inherit}
::-webkit-scrollbar{display:none}

.header{border-bottom:1px solid #141518;padding:max(env(safe-area-inset-top),20px) 20px 14px;position:sticky;top:0;background:#08090B;z-index:100}
.header-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.title-sm{font-size:8px;letter-spacing:4px;color:#333;font-weight:700}
.title-lg{font-size:18px;font-weight:800;letter-spacing:-0.5px;margin-top:2px}
.title-sub{font-size:9px;color:#444;margin-top:3px}
.phase-name{font-size:11px;font-weight:700;text-align:right}
.phase-tag{font-size:9px;color:#555;margin-top:1px;text-align:right}
.phase-wk{font-size:9px;color:#333;margin-top:1px;text-align:right}

.tabs{display:flex;gap:0;overflow-x:auto;padding-bottom:1px}
.tab{background:none;border:none;padding:7px 12px 9px;font-size:8px;letter-spacing:1.5px;font-weight:400;color:#333;border-bottom:2px solid transparent;text-transform:uppercase;white-space:nowrap}
.tab.active{font-weight:700;color:#E0DED8}

.content{padding:0 20px}

/* Week pills */
.weeks{display:flex;gap:3px;margin:14px 0 18px;flex-wrap:wrap}
.week-pill{width:34px;height:42px;background:transparent;border:1px solid #141518;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;position:relative}
.week-pill.active{background:#111218}
.week-pill span{font-size:11px;font-weight:400;color:#555}
.week-pill.active span{font-weight:800}
.week-pill .bar{width:14px;height:2px;background:#141518;border-radius:1px;overflow:hidden}
.week-pill .bar-fill{height:100%;border-radius:1px}
.week-pill .blood-dot{position:absolute;top:2px;right:2px;width:4px;height:4px;border-radius:50%;background:#EF4444}

/* Cards */
.card{background:#0D0E11;border:1px solid #18191E;border-radius:10px;padding:14px 16px;margin-bottom:10px}
.card-decision{background:#D4A85308;border-color:#D4A85320}
.card-blood{background:#EF444408;border-color:#EF444418}

/* Pin cards */
.pin-card{border-left-width:3px;border-left-style:solid}
.pin-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.pin-name{font-size:11px;font-weight:700}
.pin-when{font-size:9px;color:#444;margin-top:1px}
.pin-dose{font-size:12px;font-weight:700;color:#E0DED8;text-align:right}
.pin-freq{font-size:9px;color:#555;text-align:right}
.pin-detail{font-size:9px;color:#555;margin-bottom:10px;line-height:1.5}
.pin-checks{display:flex;gap:4px}
.check-btn{flex:1;min-width:0;height:30px;background:#111218;border:1px solid #18191E;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:#333;transition:all 0.1s}
.check-btn.weekly{flex:0 0 auto;min-width:50px}
.check-btn.on{background:var(--cc)15}

/* Macros */
.macros{display:flex;gap:8px}
.macro{flex:1;text-align:center}
.macro-val{font-size:13px;font-weight:800}
.macro-label{font-size:7px;letter-spacing:1.5px;color:#333;margin-top:2px}

/* Routine cards */
.routine-card{border-left:3px solid;padding:14px 16px}
.routine-title{font-size:10px;font-weight:700;margin-bottom:8px}
.routine-steps{font-size:10px;color:#888;line-height:1.8}
.routine-sub{font-size:9px;color:#444;margin-top:8px;border-top:1px solid #18191E;padding-top:8px;line-height:1.6}

/* Pin count summary */
.pin-summary{display:flex;gap:12px;background:#111218;border-radius:10px;padding:16px}
.pin-count{flex:1;text-align:center}
.pin-count-num{font-size:26px;font-weight:800}
.pin-count-label{font-size:7px;color:#555;letter-spacing:1.5px;margin-top:2px}

/* Compound cards */
.compound-row{display:flex;justify-content:space-between;padding:5px 0;border-top:1px solid #141518}
.compound-row span:first-child{font-size:9px;color:#444}
.compound-row span:last-child{font-size:10px;color:#888;font-weight:500;text-align:right;max-width:60%}

/* Training */
.train-card .day-name{font-size:12px;font-weight:800;color:#E0DED8}
.train-card .day-focus{font-size:8px;letter-spacing:1.5px;font-weight:700}
.train-card .day-ex{font-size:10px;color:#666;line-height:1.6;margin-top:5px}

/* Shopping */
.shop-item{display:flex;justify-content:space-between;align-items:center;padding:12px 16px}
.shop-item span:first-child{font-size:11px}
.shop-item span:last-child{font-size:12px;font-weight:800}

/* Inputs */
.weight-input{background:transparent;border:none;outline:none;font-size:18px;font-weight:800;color:#E0DED8;width:100%;font-family:inherit}
.notes-input{background:transparent;border:none;outline:none;resize:none;font-size:10px;color:#777;width:100%;font-family:inherit;line-height:1.5}
.section-label{font-size:8px;letter-spacing:2px;color:#333;font-weight:700;margin-bottom:4px}
.info-box{background:#111218;border-radius:8px;padding:12px 14px;font-size:10px;color:#555;line-height:1.6;margin-top:12px}
.info-box strong{color:#888}
.warning{font-size:9px;color:#EF4444;margin-top:8px;border-top:1px solid #18191E;padding-top:8px;line-height:1.6}

.hidden{display:none}
</style>
</head>
<body>
<div class="header">
  <div class="header-row">
    <div>
      <div class="title-sm">14-WEEK RECOMP</div>
      <h1 class="title-lg">PEPTIDE PROTOCOL</h1>
      <div class="title-sub">83kg · 181cm · 12-15% → 9-11% BF · 2 pins/day</div>
    </div>
    <div>
      <div class="phase-name" id="phaseName"></div>
      <div class="phase-tag" id="phaseTag"></div>
      <div class="phase-wk" id="phaseWk"></div>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
</div>
<div class="content" id="content"></div>

<script>
const P={phases:[{name:"BASE",weeks:[1,2],color:"#4A9EAF",tag:"Foundation"},{name:"INTRODUCTION",weeks:[3,4],color:"#D4A853",tag:"Reta + MT-2 Loading"},{name:"ESCALATION",weeks:[5,6],color:"#C67A3C",tag:"Dose Ramp"},{name:"ESCALATION II",weeks:[7,8],color:"#B85C38",tag:"IGF-1 Decision"},{name:"CRUISE",weeks:[9,10,11,12,13,14],color:"#8B3A3A",tag:"Payoff Window"}],
compounds:[{key:"klow",name:"KLOW BLEND",sub:"BPC-157 · TB-500 · KPV · GHK-Cu",color:"#4A9EAF",recon:"2ml BAC water → 40mg/ml",store:"Fridge, use within 28 days",vials:3,timing:"Morning, before food"},{key:"cjc",name:"CJC-1295 (no DAC) + IPA",sub:"GH Secretagogue Blend",color:"#7B8CDE",recon:"2ml BAC water → 5mg/ml",store:"Fridge, use within 25 days",vials:3,timing:"Before bed, empty stomach"},{key:"reta",name:"GLP-3 RT (RETATRUTIDE)",sub:"Triple Agonist · GLP-1/GIP/Glucagon",color:"#D4A853",recon:"2ml BAC water → 5mg/ml",store:"Fridge, use within 30 days",vials:2,timing:"Sunday evening"},{key:"mt2",name:"MELANOTAN II",sub:"Melanocortin Agonist · Tanning",color:"#C084FC",recon:"2ml BAC water → 5mg/ml",store:"Fridge, use within 28 days",vials:1,timing:"Before bed (with CJC/Ipa)"},{key:"igf",name:"IGF-1 LR3",sub:"Week 8 Decision Point",color:"#8B3A3A",recon:"TBD",store:"TBD",vials:"—",timing:"Post-workout if added"}],
topicals:[{name:"GHK-Cu Serum",use:"AM + PM on clean skin",target:"Acne, scarring, skin quality"},{name:"Niacinamide 5% Serum",use:"AM under SPF",target:"Sebum control, barrier repair"}],
orals:[{name:"Niacinamide",dose:"500mg/day"},{name:"Zinc Picolinate",dose:"30mg/day"},{name:"Vitamin D3",dose:"5000 IU/day"},{name:"Magnesium Glycinate",dose:"400mg before bed"}],
weeks:[
{week:1,phase:"BASE",pins:[{compound:"klow",dose:"10 units (0.1ml)",when:"☀️ Morning fasted",detail:"500mcg BPC / 500mcg TB / 500mcg KPV / 2.5mg GHK-Cu",freq:"daily"},{compound:"cjc",dose:"4 units (0.04ml)",when:"🌙 Before bed",detail:"Empty stomach — GH pulse during deep sleep",freq:"daily"}],training:"Full intensity — log all lifts for baseline",macros:{cals:"2,800–2,900",p:200,f:75,c:"320–340"},notes:"Establish pinning routine. No reta/MT-2 yet. Just build the habit.",blood:"BASELINE BLOODS: IGF-1, metabolic panel, fasting glucose/insulin, HbA1c, lipids, CRP, testosterone (free + total)"},
{week:2,phase:"BASE",pins:[{compound:"klow",dose:"10 units",when:"☀️ Morning",detail:"Same as week 1",freq:"daily"},{compound:"cjc",dose:"4 units",when:"🌙 Before bed",detail:"Same as week 1",freq:"daily"}],training:"Progressive overload — add weight or reps",macros:{cals:"2,800–2,900",p:200,f:75,c:"320–340"},notes:"Assess sleep quality. Any recovery improvements? Dial in meal timing."},
{week:3,phase:"INTRODUCTION",pins:[{compound:"klow",dose:"10 units",when:"☀️ Morning",detail:"Same protocol",freq:"daily"},{compound:"cjc",dose:"4 units",when:"🌙 Before bed",detail:"Same protocol",freq:"daily"},{compound:"reta",dose:"0.5mg (10 units)",when:"🟡 Sunday PM",detail:"Light meal before. Expect mild nausea 24-48hrs.",freq:"1×/week"},{compound:"mt2",dose:"250mcg (5 units)",when:"🌙 Before bed",detail:"LOADING: daily for 10 days. Pin with CJC/Ipa, separate syringe. Get 15-20min UV within hours.",freq:"daily×10"}],training:"Maintain intensity. Monitor appetite from reta.",macros:{cals:"2,800–2,900",p:200,f:75,c:"320–340"},notes:"MT-2 loading starts. Expect mild nausea + facial flushing. Pin MT-2 before bed to sleep through it. Reta nausea may stack."},
{week:4,phase:"INTRODUCTION",pins:[{compound:"klow",dose:"10 units",when:"☀️ Morning",detail:"Same protocol",freq:"daily"},{compound:"cjc",dose:"4 units",when:"🌙 Before bed",detail:"Same protocol",freq:"daily"},{compound:"reta",dose:"0.5mg (10 units)",when:"🟡 Sunday PM",detail:"Tolerability check. Note appetite changes.",freq:"1×/week"},{compound:"mt2",dose:"500mcg (10 units)",when:"🌙 Before bed",detail:"MAINTENANCE: 2× per week (Mon + Thu). Loading complete.",freq:"2×/week"}],training:"Progressive overload. Tan should be building.",macros:{cals:"2,800–2,900",p:200,f:75,c:"320–340"},notes:"MT-2 loading done → maintenance. Base tan establishing. Brief UV sessions to activate melanin. Don't burn."},
{week:5,phase:"ESCALATION",pins:[{compound:"klow",dose:"10 units",when:"☀️ Morning",detail:"Same protocol",freq:"daily"},{compound:"cjc",dose:"4 units",when:"🌙 Before bed",detail:"Same protocol",freq:"daily"},{compound:"reta",dose:"1mg (20 units)",when:"🟡 Sunday PM",detail:"First escalation. Warmer body temp, more satiety.",freq:"1×/week"},{compound:"mt2",dose:"500mcg (10 units)",when:"🌙 Before bed",detail:"Maintenance 2×/week",freq:"2×/week"}],training:"Push intensity — growth window opening",macros:{cals:"2,800–2,900",p:200,f:75,c:"320–340"},notes:"Reta metabolic effect kicks in. Slightly warmer, better fasted energy. Tan deepening."},
{week:6,phase:"ESCALATION",pins:[{compound:"klow",dose:"10 units",when:"☀️ Morning",detail:"Same protocol",freq:"daily"},{compound:"cjc",dose:"4 units",when:"🌙 Before bed",detail:"Same protocol",freq:"daily"},{compound:"reta",dose:"1mg (20 units)",when:"🟡 Sunday PM",detail:"Hold dose. Assess tolerability.",freq:"1×/week"},{compound:"mt2",dose:"500mcg (10 units)",when:"🌙 Before bed",detail:"Maintenance 2×/week",freq:"2×/week"}],training:"Progressive overload — track all lifts",macros:{cals:"2,800–2,900",p:200,f:75,c:"320–340"},notes:"Visual changes beginning — leaner lower back/midsection. Tan established. Skin improving.",blood:"MID-CYCLE BLOODS: IGF-1, liver panel, fasting glucose, CRP"},
{week:7,phase:"ESCALATION II",pins:[{compound:"klow",dose:"10 units",when:"☀️ Morning",detail:"Same protocol",freq:"daily"},{compound:"cjc",dose:"4 units",when:"🌙 Before bed",detail:"Same protocol",freq:"daily"},{compound:"reta",dose:"1.5mg (30 units)",when:"🟡 Sunday PM",detail:"Final escalation. This is your cruise dose.",freq:"1×/week"},{compound:"mt2",dose:"500mcg (10 units)",when:"🌙 Before bed",detail:"Maintenance 2×/week",freq:"2×/week"}],training:"Maintain or increase intensity. Recomp accelerating.",macros:{cals:"2,700–2,800",p:200,f:70,c:"300–320"},notes:"Slight calorie reduction. Reta elevating expenditure. Mirror changes accelerating."},
{week:8,phase:"ESCALATION II",pins:[{compound:"klow",dose:"10 units",when:"☀️ Morning",detail:"Same protocol",freq:"daily"},{compound:"cjc",dose:"4 units",when:"🌙 Before bed",detail:"Same protocol",freq:"daily"},{compound:"reta",dose:"1.5mg (30 units)",when:"🟡 Sunday PM",detail:"Cruise dose — hold here.",freq:"1×/week"},{compound:"mt2",dose:"500mcg (10 units)",when:"🌙 Before bed",detail:"Maintenance 2×/week",freq:"2×/week"}],training:"Assess strength. Any regression? Maintain loads.",macros:{cals:"2,700–2,800",p:200,f:70,c:"300–320"},notes:"⚡ IGF-1 LR3 DECISION POINT: Review mid-cycle bloods + mirror progress. If adding: 20-40mcg/day post-workout for 4 weeks.",blood:"Review week 6 bloods. IGF-1 elevated? Liver clean? CRP low?"},
{week:9,phase:"CRUISE",pins:[{compound:"klow",dose:"10 units",when:"☀️ Morning",detail:"Same protocol",freq:"daily"},{compound:"cjc",dose:"4 units",when:"🌙 Before bed",detail:"Same protocol",freq:"daily"},{compound:"reta",dose:"1.5mg (30 units)",when:"🟡 Sunday PM",detail:"Cruise dose",freq:"1×/week"},{compound:"mt2",dose:"500mcg (10 units)",when:"🌙 Before bed",detail:"Maintenance 2×/week",freq:"2×/week"}],training:"PPL / Upper / Lower — full V-taper focus",macros:{cals:"2,700–2,800",p:200,f:70,c:"300–320"},notes:"Payoff window begins. 6 weeks at full working dose. Train hard, eat precisely, sleep 7-8hrs."},
{week:10,phase:"CRUISE",pins:[{compound:"klow",dose:"10 units",when:"☀️ Morning",detail:"Same protocol",freq:"daily"},{compound:"cjc",dose:"4 units",when:"🌙 Before bed",detail:"Same protocol",freq:"daily"},{compound:"reta",dose:"1.5mg (30 units)",when:"🟡 Sunday PM",detail:"Cruise dose",freq:"1×/week"},{compound:"mt2",dose:"500mcg (10 units)",when:"🌙 Before bed",detail:"Maintenance 2×/week",freq:"2×/week"}],training:"Shoulder caps, lat width, upper chest priority",macros:{cals:"2,700–2,800",p:200,f:70,c:"300–320"},notes:"Veins appearing in arms/shoulders. Ab definition improving. Tan + leanness = the look."},
{week:11,phase:"CRUISE",pins:[{compound:"klow",dose:"10 units",when:"☀️ Morning",detail:"Same protocol",freq:"daily"},{compound:"cjc",dose:"4 units",when:"🌙 Before bed",detail:"Same protocol",freq:"daily"},{compound:"reta",dose:"1.5mg (30 units)",when:"🟡 Sunday PM",detail:"Cruise dose",freq:"1×/week"},{compound:"mt2",dose:"500mcg (10 units)",when:"🌙 Before bed",detail:"Can reduce to 1×/week if tan is deep enough",freq:"1-2×/week"}],training:"Progressive overload — strength maintenance is a win",macros:{cals:"2,600–2,700",p:200,f:70,c:"280–300"},notes:"Slight calorie reduction if fat loss has plateaued. Keep protein at 200g."},
{week:12,phase:"CRUISE",pins:[{compound:"klow",dose:"10 units",when:"☀️ Morning",detail:"Same protocol",freq:"daily"},{compound:"cjc",dose:"4 units",when:"🌙 Before bed",detail:"Same protocol",freq:"daily"},{compound:"reta",dose:"1.5mg (30 units)",when:"🟡 Sunday PM",detail:"Cruise dose",freq:"1×/week"},{compound:"mt2",dose:"500mcg (10 units)",when:"🌙 Before bed",detail:"Maintenance",freq:"1×/week"}],training:"Maintain intensity — don't drop loads",macros:{cals:"2,600–2,700",p:200,f:70,c:"280–300"},notes:"Visibly leaner + tanned. Shoulders and arms fuller despite lower BF. Skin clearing."},
{week:13,phase:"CRUISE",pins:[{compound:"klow",dose:"10 units",when:"☀️ Morning",detail:"Same protocol",freq:"daily"},{compound:"cjc",dose:"4 units",when:"🌙 Before bed",detail:"Same protocol",freq:"daily"},{compound:"reta",dose:"1.5mg (30 units)",when:"🟡 Sunday PM",detail:"Cruise dose",freq:"1×/week"},{compound:"mt2",dose:"500mcg (10 units)",when:"🌙 Before bed",detail:"Maintenance",freq:"1×/week"}],training:"Final push — peak training stimulus",macros:{cals:"2,600–2,700",p:200,f:70,c:"280–300"},notes:"Body composition dramatically different from week 1. Start thinking about post-protocol plan."},
{week:14,phase:"CRUISE",pins:[{compound:"klow",dose:"10 units",when:"☀️ Morning",detail:"Final week",freq:"daily"},{compound:"cjc",dose:"4 units",when:"🌙 Before bed",detail:"Final week",freq:"daily"},{compound:"reta",dose:"1.5mg (30 units)",when:"🟡 Sunday PM",detail:"Final dose",freq:"1×/week"},{compound:"mt2",dose:"500mcg (10 units)",when:"🌙 Before bed",detail:"Final maintenance dose",freq:"1×/week"}],training:"Deload if needed",macros:{cals:"2,600–2,700",p:200,f:70,c:"280–300"},notes:"TARGET: 81-83kg at 9-11% BF. Tanned, lean, full. Reassess continuation.",blood:"END BLOODS: Full panel — IGF-1, metabolic, glucose, insulin, HbA1c, lipids, CRP, testosterone. Compare to baseline."}
],
training:[{day:"PUSH",ex:"Incline DB press · OHP · Lateral raises (heavy partials + full ROM) · Triceps",focus:"Shoulder cap + upper chest"},{day:"PULL",ex:"Weighted pull-ups (wide) · Chest-supported rows · Face pulls · Biceps",focus:"Lat width → V-taper"},{day:"LEGS",ex:"Squat / Leg press · RDLs · Leg curls · Calves",focus:"Moderate — recovery slower in deficit"},{day:"UPPER",ex:"Flat bench · Barbell rows · Lateral raises · Arms superset",focus:"2nd shoulder + arm hit"},{day:"LOWER",ex:"Deadlift / Hip thrust · Front squat · Lunges · Calves",focus:"Moderate volume"}],
shopping:[{item:"Klow Blend 80mg",qty:3},{item:"CJC/Ipa 10mg Blend",qty:3},{item:"Retatrutide (GLP-3 RT) 10mg",qty:2},{item:"Melanotan II 10mg",qty:1},{item:"BAC Water 30ml",qty:1},{item:"Insulin Syringes 1ml (29g)",qty:100},{item:"Alcohol Swabs",qty:100},{item:"GHK-Cu Topical Serum",qty:1},{item:"Niacinamide 5% Serum",qty:1},{item:"Niacinamide 500mg (oral)",qty:1},{item:"Zinc Picolinate 30mg",qty:1},{item:"Vitamin D3 5000 IU",qty:1},{item:"Magnesium Glycinate 400mg",qty:1}]};

const CC={klow:"#4A9EAF",cjc:"#7B8CDE",reta:"#D4A853",mt2:"#C084FC",igf:"#8B3A3A"};
const TABS=["protocol","routine","compounds","training","shopping"];

let state={tab:"protocol",week:1,checks:{},notes:{},weights:{}};

function load(){try{const d=JSON.parse(localStorage.getItem("pp-v3")||"{}");state.checks=d.checks||{};state.notes=d.notes||{};state.weights=d.weights||{};if(d.week)state.week=d.week}catch(e){}}
function save(){localStorage.setItem("pp-v3",JSON.stringify({checks:state.checks,notes:state.notes,weights:state.weights,week:state.week}))}

function getPhase(w){return P.phases.find(p=>p.weeks.includes(w))}
function getWeek(w){return P.weeks.find(x=>x.week===w)}
function getCompound(k){return P.compounds.find(c=>c.key===k)}

function pct(wk){const w=getWeek(wk);if(!w)return 0;let t=0,d=0;w.pins.forEach(p=>{const n=p.freq==="daily"?7:p.freq==="daily×10"?7:p.freq.includes("week")?parseInt(p.freq)||1:1;for(let i=0;i<n;i++){t++;if(state.checks[`${wk}-${p.compound}-${i}`])d++}});return t>0?Math.round(d/t*100):0}

function toggle(key){state.checks[key]=!state.checks[key];save();render()}

function updateHeader(){
  const ph=getPhase(state.week);
  document.getElementById("phaseName").style.color=ph.color;
  document.getElementById("phaseName").textContent=ph.name;
  document.getElementById("phaseTag").textContent=ph.tag;
  document.getElementById("phaseWk").textContent=`Wk ${state.week}/14`;
  
  document.getElementById("tabs").innerHTML=TABS.map(t=>`<button class="tab${state.tab===t?" active":""}" style="${state.tab===t?`border-bottom-color:${ph.color}`:""}" onclick="state.tab='${t}';render()">${t}</button>`).join("");
}

function renderProtocol(){
  const ph=getPhase(state.week);const wd=getWeek(state.week);
  let h=`<div class="weeks">`;
  P.weeks.forEach(w=>{
    const p=getPhase(w.week);const pc=pct(w.week);const a=w.week===state.week;
    h+=`<button class="week-pill${a?" active":""}" style="${a?`border-color:${p.color}30`:""}" onclick="state.week=${w.week};save();render()">
      <span style="color:${a?p.color:"#555"};font-weight:${a?800:400}">${w.week}</span>
      ${pc>0?`<div class="bar"><div class="bar-fill" style="width:${pc}%;background:${pc===100?"#4ADE80":p.color}"></div></div>`:""}
      ${w.blood?'<div class="blood-dot"></div>':""}
    </button>`;
  });
  h+=`</div>`;

  if(wd){
    if(wd.notes)h+=`<div class="card${wd.notes.includes("DECISION")?" card-decision":""}" style="font-size:11px;color:#888;line-height:1.7">${wd.notes}</div>`;
    if(wd.blood)h+=`<div class="card card-blood"><div style="font-size:8px;letter-spacing:2px;color:#EF4444;font-weight:700;margin-bottom:4px">🩸 BLOODWORK</div><div style="font-size:10px;color:#F87171;line-height:1.6">${wd.blood}</div></div>`;

    wd.pins.forEach((pin,pi)=>{
      const cc=CC[pin.compound];const c=getCompound(pin.compound);
      const isW=pin.freq!=="daily"&&pin.freq!=="daily×10";
      const slots=isW?(pin.freq==="2×/week"?["Pin 1","Pin 2"]:["Pin"]):["M","T","W","T","F","S","S"];
      h+=`<div class="card pin-card" style="border-left-color:${cc}">
        <div class="pin-header"><div><div class="pin-name" style="color:${cc}">${c.name}</div><div class="pin-when">${pin.when}</div></div><div><div class="pin-dose">${pin.dose}</div><div class="pin-freq">${pin.freq}</div></div></div>
        <div class="pin-detail">${pin.detail}</div>
        <div class="pin-checks">${slots.map((s,i)=>{
          const k=`${state.week}-${pin.compound}-${i}`;const on=state.checks[k];
          return`<button class="check-btn${isW?" weekly":""}" style="${on?`background:${cc}15;border-color:${cc}40;color:${cc}`:`color:#333`}" onclick="toggle('${k}')">${on?"✓":s}</button>`
        }).join("")}</div></div>`;
    });

    h+=`<div class="card"><div class="section-label" style="margin-bottom:10px">DAILY MACROS (TRAINING DAYS)</div><div class="macros">
      <div class="macro"><div class="macro-val" style="color:#E0DED8">${wd.macros.cals}</div><div class="macro-label">CALS</div></div>
      <div class="macro"><div class="macro-val" style="color:#4ADE80">${wd.macros.p}g</div><div class="macro-label">PROTEIN</div></div>
      <div class="macro"><div class="macro-val" style="color:#FBBF24">${wd.macros.f}g</div><div class="macro-label">FAT</div></div>
      <div class="macro"><div class="macro-val" style="color:#60A5FA">${wd.macros.c}g</div><div class="macro-label">CARBS</div></div>
    </div><div style="font-size:9px;color:#333;margin-top:8px;text-align:center">Rest days: same protein, reduce carbs by 60-80g, drop ~300 cals</div></div>`;

    h+=`<div class="card"><div class="section-label">TRAINING</div><div style="font-size:11px;color:#888;line-height:1.5;margin-top:4px">${wd.training}</div></div>`;

    h+=`<div style="display:flex;gap:8px;margin-bottom:20px">
      <div class="card" style="flex:0 0 100px"><div class="section-label">WEIGHT</div><input class="weight-input" type="number" step="0.1" placeholder="—" value="${state.weights[state.week]||""}" oninput="state.weights[${state.week}]=this.value;save()"><div style="font-size:8px;color:#333">kg</div></div>
      <div class="card" style="flex:1"><div class="section-label">YOUR NOTES</div><textarea class="notes-input" rows="2" placeholder="How's training, appetite, skin, tan..." oninput="state.notes[${state.week}]=this.value;save()">${state.notes[state.week]||""}</textarea></div>
    </div>`;
  }
  return h;
}

function renderRoutine(){
  return`<div style="margin-top:18px"><div class="section-label" style="margin-bottom:14px">YOUR ACTUAL DAILY ROUTINE</div>
  <div class="card routine-card" style="border-left-color:#4A9EAF"><div class="routine-title" style="color:#4A9EAF">☀️ MORNING — BEFORE FOOD</div><div class="routine-steps">1. Alcohol swab injection site (belly, rotate L/R)<br>2. Draw 10 units of Klow → pin subcutaneous<br>3. Done. ~30 seconds.</div><div class="routine-sub">Then: Apply GHK-Cu serum + Niacinamide serum to face. Take zinc + vitamin D + niacinamide capsule with breakfast.</div></div>
  <div class="card routine-card" style="border-left-color:#7B8CDE"><div class="routine-title" style="color:#7B8CDE">🌙 BEFORE BED — EMPTY STOMACH</div><div class="routine-steps">1. Draw 4 units of CJC/Ipa → pin subcutaneous (belly)<br>2. On MT-2 days: draw second syringe, 5-10 units → pin (same sitting)<br>3. Take magnesium glycinate<br>4. Done. ~45 seconds total.</div><div class="routine-sub">Then: GHK-Cu serum on face again before sleep. The CJC/Ipa pulse syncs with your deepest GH release window overnight.</div></div>
  <div class="card routine-card" style="border-left-color:#D4A853"><div class="routine-title" style="color:#D4A853">🟡 SUNDAY EVENING — WEEKLY</div><div class="routine-steps">1. Draw reta dose (10-30 units depending on phase) → pin subcutaneous<br>2. Light meal beforehand. Stay hydrated.<br>3. Can be done in same sitting as CJC/Ipa — separate syringe.</div></div>
  <div class="card routine-card" style="border-left-color:#C084FC"><div class="routine-title" style="color:#C084FC">MT-2 SCHEDULE</div><div class="routine-steps"><strong style="color:#C084FC">Weeks 3-4 (loading):</strong> 250mcg daily for 10 days → before bed with CJC/Ipa<br><strong style="color:#C084FC">Weeks 4-10:</strong> 500mcg 2× per week (Mon + Thu)<br><strong style="color:#C084FC">Weeks 11-14:</strong> 500mcg 1× per week (maintenance)</div><div class="warning">⚠️ Get a mole map from a dermatologist BEFORE starting MT-2 and again after your cycle. Get 15-20min UV within hours of pinning. Don't burn.</div></div>
  <div class="card pin-summary"><div class="pin-count"><div class="pin-count-num" style="color:#4ADE80">2</div><div class="pin-count-label">MOST DAYS</div></div><div class="pin-count"><div class="pin-count-num" style="color:#FBBF24">3</div><div class="pin-count-label">MT-2 DAYS</div></div><div class="pin-count"><div class="pin-count-num" style="color:#D4A853">+1</div><div class="pin-count-label">SUNDAYS (RETA)</div></div></div></div>`;
}

function renderCompounds(){
  let h=`<div style="margin-top:18px">`;
  P.compounds.forEach(c=>{
    h+=`<div class="card" style="border-left:3px solid ${c.color};opacity:${c.key==="igf"?0.4:1}">
      <div style="font-size:12px;font-weight:700;color:${c.color}">${c.name}</div>
      <div style="font-size:9px;color:#555;margin:1px 0 10px">${c.sub}</div>
      ${[["Reconstitution",c.recon],["Storage",c.store],["Vials (14 wks)",c.vials],["Timing",c.timing]].map(r=>`<div class="compound-row"><span>${r[0]}</span><span>${r[1]}</span></div>`).join("")}
    </div>`;
  });
  h+=`<div class="section-label" style="margin-top:18px;margin-bottom:10px">TOPICALS</div>`;
  P.topicals.forEach(t=>{h+=`<div class="card" style="display:flex;justify-content:space-between"><div><div style="font-size:11px;color:#888;font-weight:600">${t.name}</div><div style="font-size:9px;color:#444">${t.use}</div></div><div style="font-size:9px;color:#555;text-align:right">${t.target}</div></div>`});
  h+=`<div class="section-label" style="margin-top:18px;margin-bottom:10px">DAILY ORALS</div>`;
  P.orals.forEach(o=>{h+=`<div class="card" style="display:flex;justify-content:space-between"><span style="font-size:11px;color:#888">${o.name}</span><span style="font-size:11px;color:#E0DED8;font-weight:600">${o.dose}</span></div>`});
  h+=`<div class="info-box" style="margin-bottom:20px"><strong>Reconstitution:</strong> BAC water only. Inject slowly down inside wall of vial. Swirl gently — never shake.</div></div>`;
  return h;
}

function renderTraining(){
  const ph=getPhase(state.week);
  let h=`<div style="margin-top:18px"><div class="section-label" style="margin-bottom:14px">PUSH / PULL / LEGS / UPPER / LOWER — V-TAPER PRIORITY</div>`;
  P.training.forEach(t=>{
    h+=`<div class="card train-card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px"><span class="day-name">${t.day}</span><span class="day-focus" style="color:${ph.color}">${t.focus}</span></div><div class="day-ex">${t.ex}</div></div>`;
  });
  h+=`<div class="info-box" style="margin-bottom:20px"><strong>Rule:</strong> Add weight or reps weekly. If a lift regresses after wk 8-9, hold and maintain. At 181cm the V-taper (shoulders, lats, upper chest) is what makes you look shredded, not just lean.</div></div>`;
  return h;
}

function renderShopping(){
  let h=`<div style="margin-top:18px"><div class="section-label" style="margin-bottom:14px">14-WEEK SUPPLY LIST</div>`;
  P.shopping.forEach((s,i)=>{
    const inj=i<4;const cols=[CC.klow,CC.cjc,CC.reta,CC.mt2];
    h+=`<div class="card shop-item" style="${inj?`border-left:3px solid ${cols[i]}`:""}"><span style="color:${i<7?"#E0DED8":"#888"}">${s.item}</span><span style="color:${i<4?"#D4A853":"#555"}">×${s.qty}</span></div>`;
  });
  h+=`<div class="info-box" style="margin-bottom:20px"><strong>IGF-1 LR3 not listed</strong> — pending week 8 decision. If added: 1-2 vials (1mg each) for 4-week blast at 20-40mcg/day post-workout.</div></div>`;
  return h;
}

function render(){
  updateHeader();
  const c=document.getElementById("content");
  switch(state.tab){
    case"protocol":c.innerHTML=renderProtocol();break;
    case"routine":c.innerHTML=renderRoutine();break;
    case"compounds":c.innerHTML=renderCompounds();break;
    case"training":c.innerHTML=renderTraining();break;
    case"shopping":c.innerHTML=renderShopping();break;
  }
}

load();render();
</script>
</body>
</html>
