<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Protocol Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#08090B;font-family:'JetBrains Mono','SF Mono',monospace;color:#E0DED8;min-height:100dvh;padding-bottom:60px}
button{font-family:inherit;cursor:pointer}input,textarea{font-family:inherit}
::-webkit-scrollbar{display:none}
.hdr{border-bottom:1px solid #141518;padding:max(env(safe-area-inset-top),20px) 20px 14px;position:sticky;top:0;background:#08090B;z-index:100}
.tabs{display:flex;gap:0;overflow-x:auto}
.tab{background:none;border:none;padding:7px 10px 9px;font-size:7.5px;letter-spacing:1px;font-weight:400;color:#333;border-bottom:2px solid transparent;text-transform:uppercase;white-space:nowrap}
.tab.a{font-weight:700;color:#E0DED8}
.cnt{padding:0 20px}
.cd{background:#0D0E11;border:1px solid #18191E;border-radius:10px;padding:14px 16px;margin-bottom:10px}
.lbl{font-size:8px;letter-spacing:2px;color:#333;font-weight:700}
.ib{background:#111218;border-radius:8px;padding:12px 14px;font-size:10px;color:#555;line-height:1.6;margin-top:12px}
.ib strong{color:#888}
.sym{display:inline-flex;align-items:center;padding:4px 8px;border-radius:4px;font-size:8px;font-weight:600;margin:2px;cursor:pointer;border:1px solid #18191E;background:#111218;color:#555;transition:all .15s}
.sym.on{background:#FBBF2418;border-color:#FBBF2440;color:#FBBF24}
.sc{width:28px;height:28px;border-radius:5px;border:1px solid #18191E;background:#111218;display:flex;align-items:center;justify-content:center;font-size:9px;color:#333;font-weight:600;transition:all .1s}
.sc.on{background:#4ADE8018;border-color:#4ADE8040;color:#4ADE80}
.qa{padding:8px 14px;border-radius:6px;border:1px solid #18191E;background:#111218;font-size:10px;color:#888;font-weight:600;transition:all .15s}
.qa:active{background:#4ADE8010;border-color:#4ADE8030;color:#4ADE80}
.wle{background:#0D0E11;border:1px solid #18191E;border-radius:8px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:flex-start;gap:10px}
</style>
</head>
<body>
<div class="hdr"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px"><div><div style="font-size:8px;letter-spacing:4px;color:#333;font-weight:700">14-WEEK RECOMP</div><h1 style="font-size:18px;font-weight:800;letter-spacing:-0.5px;margin-top:2px">PEPTIDE PROTOCOL</h1><div style="font-size:9px;color:#444;margin-top:3px">83kg · 181cm · 12-15% → 9-11% BF</div></div><div style="text-align:right"><div id="phN" style="font-size:11px;font-weight:700"></div><div id="phT" style="font-size:9px;color:#555;margin-top:1px"></div><div id="phW" style="font-size:9px;color:#333;margin-top:1px"></div></div></div><div class="tabs" id="tabs"></div></div>

],tr:"Push intensity — recomp accelerating",mac:{cal:"2,800–2,900",p:200,f:75,c:"320–340"},n:"Mirror changes starting. Leaner midsection + lower back.",ord:"📦 Klow #3"},

],tr:"Track all lifts",mac:{cal:"2,700–2,800",p:200,f:70,c:"300–320"},n:"Slight calorie reduction. Visual changes accelerating.",bl:"MID-CYCLE BLOODS: IGF-1, liver, glucose, CRP",ord:"📦 CJC/Ipa #2 + BAC"},

],tr:"Maintain or increase",mac:{cal:"2,700–2,800",p:200,f:70,c:"300–320"},n:"People starting to notice. Tan + leanness compounding.",ord:"📦 Reta #2 + BAC"},
{week:8,phase:"DECISION",pins:[

  {c:"reta",d:"1.5mg (30u)",w:"🟡 Sunday",dt:"Cruise",f:"1×/wk"},
  {c:"mt2",d:"500mcg (10u)",w:"🌙 PM",dt:"2×/wk",f:"2×/wk"}
],tr:"Assess strength",mac:{cal:"2,700–2,800",p:200,f:70,c:"300–320"},n:"⚡ IGF-1 LR3 DECISION: Review bloods + mirror. If adding: 20-40mcg/day post-workout, 4 weeks.",bl:"Review wk6 bloods.",ord:"📦 Klow #4"},

  {c:"reta",d:"1.5mg (30u)",w:"🟡 Sunday",dt:"Cruise",f:"1×/wk"},

],tr:"V-taper focus",mac:{cal:"2,700–2,800",p:200,f:70,c:"300–320"},n:"Payoff window. 6 weeks at full dose."},

],tr:"Shoulders, lats, chest",mac:{cal:"2,700–2,800",p:200,f:70,c:"300–320"},n:"Veins + definition. The look is coming together."},
{week:11,phase:"CRUISE",pins:[

],tr:"Maintain strength",mac:{cal:"2,600–2,700",p:200,f:70,c:"280–300"},n:"Calorie cut if plateaued. Protein stays 200g.",ord:"📦 Klow #5 + BAC (final)"},

],tr:"Maintain intensity",mac:{cal:"2,600–2,700",p:200,f:70,c:"280–300"},n:"Visibly different human. Lean, tanned, full."},

],tr:"Final push",mac:{cal:"2,600–2,700",p:200,f:70,c:"280–300"},n:"Compare to week 1 photos. Plan post-protocol."},
{week:14,phase:"CRUISE",pins:[

],tr:"Deload if needed",mac:{cal:"2,600–2,700",p:200,f:70,c:"280–300"},n:"TARGET: 81-83kg, 9-11% BF. Tanned, lean, full.",bl:"END BLOODS: Full panel. Compare to baseline."}
],
shopping:[{i:"Klow 80mg",q:"5 total",n:"~20d each"},{i:"CJC/Ipa 10mg",q:"2 total",n:"~50d each"},{i:"Reta 10mg",q:"2 total",n:"~15mg needed"},{i:"MT-2 10mg",q:"1 total",n:"Full protocol"},{i:"BAC Water 30ml",q:"3 total",n:"9ml per round"},{i:"0.5ml Syringes 29g",q:"100+",n:"Daily pins"},{i:"3ml Syringes+21g needles",q:"100",n:"Reconstitution"},{i:"Alcohol Swabs",q:"100+",n:"Match syringes"},{i:"Sharps Bin 2.5L",q:"1",n:"Full protocol"}]};

const CC={klow:"#4A9EAF",cjc:"#7B8CDE",reta:"#D4A853",mt2:"#C084FC",igf:"#8B3A3A"};
const SYMS=["Nausea","Low appetite","Flushing","Inj. pain","Poor sleep","Fatigue","Bloating","Headache"];
const DS=[{id:"s1",name:"Niacinamide Serum",dose:"5% topical",time:"am"},{id:"s2",name:"Niacinamide",dose:"500mg",time:"am"},{id:"s3",name:"Zinc Picolinate",dose:"30mg",time:"am"},{id:"s4",name:"Vitamin D3",dose:"5000 IU",time:"am"},{id:"s5",name:"Magnesium Glycinate",dose:"400mg",time:"pm"}];
const DT=[{id:"t1",name:"PUSH",ex:"Incline press · OHP · Lateral raises · Triceps"},{id:"t2",name:"PULL",ex:"Pull-ups · Rows · Face pulls · Biceps"},{id:"t3",name:"LEGS",ex:"Squat · RDLs · Leg curls · Calves"},{id:"t4",name:"RUN",ex:"Zone 2 / 5-10k"}];
const TABS=["protocol","routine","supps","progress","compounds","training","shopping"];
let S={tab:"protocol",wk:1,chk:{},notes:{},wt:{},sd:null,recon:{},se:{},supps:null,sc:{},types:null,wlog:{}};

function load(){try{const d=JSON.parse(localStorage.getItem("pp-v8")||"{}");Object.keys(S).forEach(k=>{if(d[k]!==undefined)S[k]=d[k]})}catch(e){}}
function sv(){localStorage.setItem("pp-v8",JSON.stringify(S))}
function gS(){return S.supps||DS}
function gT(){return S.types||DT}
function gWL(w){return S.wlog[w]||[]}
function gP(w){return P.phases.find(p=>p.weeks.includes(w))}
function gW(w){return P.weeks.find(x=>x.week===w)}
function gC(k){return P.compounds.find(c=>c.key===k)}
function fm(d){return String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0")}
function wS(w){if(!S.sd)return null;const d=new Date(S.sd+"T00:00:00");d.setDate(d.getDate()+(w-1)*7);return d}
function dD(w,i){const s=wS(w);if(!s)return null;const d=new Date(s);d.setDate(d.getDate()+i);return d}
function pc(w){const wd=gW(w);if(!wd)return 0;let t=0,d=0;wd.pins.forEach(p=>{const n=p.f==="daily"?7:p.f==="daily×10"?7:p.f.includes("wk")?parseInt(p.f)||1:1;for(let i=0;i<n;i++){t++;if(S.chk[`${w}-${p.c}-${i}`])d++}});return t?Math.round(d/t*100):0}
function tog(k){S.chk[k]=!S.chk[k];sv();render()}
function setSd(v){S.sd=v;sv();render()}
function togSy(w,s){if(!S.se[w])S.se[w]=[];const i=S.se[w].indexOf(s);i>-1?S.se[w].splice(i,1):S.se[w].push(s);sv();render()}
function setR(k,v){S.recon[k]=v;sv();render()}
function togSc(w,d,id){const k=`${w}-${d}-${id}`;S.sc[k]=!S.sc[k];sv();render()}
function addSp(){const n=prompt("Name?");if(!n)return;const d=prompt("Dose?")||"";const t=prompt("am or pm?")||"am";const s=gS();s.push({id:"s"+Date.now(),name:n,dose:d,time:t.toLowerCase()});S.supps=s;sv();render()}
function rmSp(id){S.supps=gS().filter(s=>s.id!==id);sv();render()}
function addWL(w,tn){if(!S.wlog[w])S.wlog[w]=[];const n=prompt(`${tn} — note? (e.g. "5k 24:30", "heavy back")`)||"";S.wlog[w].push({id:"w"+Date.now(),type:tn,note:n,ts:new Date().toISOString()});sv();render()}
function addCWL(w){const nm=prompt("What? (e.g. Swimming, Boxing)");if(!nm)return;const n=prompt("Note?")||"";if(!S.wlog[w])S.wlog[w]=[];S.wlog[w].push({id:"w"+Date.now(),type:nm.toUpperCase(),note:n,ts:new Date().toISOString()});sv();render()}
function eWL(w,id){const e=(S.wlog[w]||[]).find(x=>x.id===id);if(!e)return;const n=prompt("Note:",e.note);if(n!==null)e.note=n;sv();render()}
function rWL(w,id){S.wlog[w]=(S.wlog[w]||[]).filter(e=>e.id!==id);sv();render()}
function addTy(){const n=prompt("Name? (e.g. YOGA, SWIM)");if(!n)return;const e=prompt("Exercises?")||"";const t=gT();t.push({id:"t"+Date.now(),name:n.toUpperCase(),ex:e});S.types=t;sv();render()}
function rmTy(id){S.types=gT().filter(t=>t.id!==id);sv();render()}
function edTy(id){const t=gT(),tr=t.find(x=>x.id===id);if(!tr)return;const n=prompt("Name:",tr.name);if(n)tr.name=n.toUpperCase();const e=prompt("Exercises:",tr.ex);if(e!==null)tr.ex=e;S.types=t;sv();render()}
function dL(k){const c=gC(k);if(!c||!S.recon[k])return null;return c.sd-Math.floor((new Date()-new Date(S.recon[k]+"T00:00:00"))/864e5)}

function uH(){const ph=gP(S.wk),ws=wS(S.wk);document.getElementById("phN").style.color=ph.color;document.getElementById("phN").textContent=ph.name;document.getElementById("phT").textContent=ph.tag;document.getElementById("phW").textContent=ws?`Wk ${S.wk}/14 · ${fm(ws)}`:`Wk ${S.wk}/14`;document.getElementById("tabs").innerHTML=TABS.map(t=>`<button class="tab${S.tab===t?" a":""}" style="${S.tab===t?`border-bottom-color:${ph.color}`:""}" onclick="S.tab='${t}';sv();render()">${t}</button>`).join("")}

function rP(){const ph=gP(S.wk),wd=gW(S.wk);let h="";
  if(!S.sd){h+=`<div class="cd" style="border-color:#D4A85330;background:#D4A85308;margin-top:16px"><div class="lbl" style="color:#D4A853;margin-bottom:8px">SET START DATE</div><input type="date" id="sdp" value="2026-04-02" style="background:#111218;border:1px solid #18191E;border-radius:6px;padding:8px 12px;color:#E0DED8;font-size:12px;width:100%;margin-bottom:8px"><button onclick="setSd(document.getElementById('sdp').value)" style="background:${ph.color};border:none;border-radius:6px;padding:8px;color:#fff;font-size:10px;font-weight:600;width:100%">START</button></div>`}
  else{h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin:14px 0 6px"><div class="lbl">WEEKS</div><button onclick="if(confirm('Change date?')){S.sd=null;sv();render()}" style="background:none;border:none;font-size:8px;color:#333;text-decoration:underline;font-family:inherit">edit</button></div>`}
